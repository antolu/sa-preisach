trainer:
  accelerator: cpu
  max_epochs: 300
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  devices: 1
  enable_checkpointing: true
  # logger:
  #   class_path: lightning.pytorch.loggers.neptune.NeptuneLogger
  #   init_args:
  #     project: hysteresis/Preisach-NN
  #     prefix: ""
  #     log_model_checkpoints: true
  #       # proxies={"http": "http://cs-513-ml001:8080", "https": "http://cs-513-ml001:8080"}
  callbacks:
    - class_path: sa_preisach.callbacks.PlotHysteresisCallback
      init_args:
        validate_every_n_epochs: 50
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: validation/loss
        mode: min
        save_top_k: 1
        filename: "epoch={epoch}-{validation/loss:.2e}"
        auto_insert_metric_name: false

data:
  known_covariates: I_ref_A
  target_covariate: B_meas_T
  train_df_paths: ~/cernbox/hysteresis/dipole/datasets/v6/rdp/train_preisach.parquet
  val_df_paths: ~/cernbox/hysteresis/dipole/datasets/v6/rdp/val_preisach.parquet
  downsample: 1
  target_depends_on: ${data.known_covariates}
  extra_transforms:
    B_meas_T:
      - class_path: transformertf.data.transform.DiscreteFunctionTransform
        init_args:
          xs_: ~/cernbox/hysteresis/calibration_fn/SPS_MB_I2B_PREISACH_CALIBRATION_FN_v1.csv
      - class_path: transformertf.data.transform.MinMaxScaler
        init_args:
          data_min_: 0.0
          data_max_: 0.0145
    I_ref_A:
      - class_path: transformertf.data.transform.MinMaxScaler
        init_args:
          data_min_: 100
          data_max_: 5850

model:
  class_path: sa_preisach.models.DifferentiablePreisachNN
  init_args:
    mesh_scale: 0.025
    hidden_dim: 32
    num_layers: 3
    mesh_density_function:
      class_path: sa_preisach.utils.DefaultMeshSizeFunction
      init_args:
        scale: 0.9
        offset: 0.04
    temp: 1e-3
    lr: 1e-2
    lr_scale: 1e-2
    lr_sa: 0.1
    lr_step_interval: 100
    lr_gamma: 0.9
    freeze_initial_state_after: 200
    update_initial_state_every: 200
    resample_every: 50
    compile_model: true
