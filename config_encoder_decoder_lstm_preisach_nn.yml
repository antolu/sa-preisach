seed_everything: null
trainer:
  accelerator: cpu
  max_epochs: 100
  min_epochs: 5
  val_check_interval: 0.1
  log_every_n_steps: 1
  devices: 1
  gradient_clip_val: null
  # enable_checkpointing: false
  enable_progress_bar: true
  callbacks:
    - class_path: sa_preisach.callbacks.PlotHysteresisCallback
      init_args:
        plot_training: True
        train_plot_interval: 100
    - class_path: transformertf.callbacks.SetOptimizerLRCallback

data:
  class_path: transformertf.data.EncoderDecoderDataModule
  init_args:
    known_covariates: I_meas_A_filtered
    target_covariate: B_meas_T_filtered_eddy_corrected
    train_df_paths: ~/cernbox/hysteresis/dipole/datasets/v10/rdp_datasets/validation/MD20240904/MD20240904_all_preprocessed_rdp_1_00e-03.parquet
    val_df_paths: ~/cernbox/hysteresis/dipole/datasets/v10/rdp_datasets/extras/SPS-BTRAIN-20231102-091712---20231102-092616_phys+lhcfill_zero_precycle_preprocessed_rdp_1_00e-03.parquet
    ctxt_seq_len: 200
    tgt_seq_len: 100
    downsample: 1
    normalize: false
    target_depends_on: I_meas_A_filtered
    batch_size: 64
    num_workers: 0
    shuffle: true
    extra_transforms:
      B_meas_T_filtered_eddy_corrected:
        - class_path: transformertf.data.transform.DiscreteFunctionTransform
          init_args:
            xs_: sample/calibration_fn.csv
            # xs_: ~/cernbox/hysteresis/calibration_fn/SPS_MB_I2B_CALIBRATION_FN_v8.csv
        - class_path: transformertf.data.transform.MinMaxScaler
          init_args:
            min_: 0
            max_: 1
      I_meas_A_filtered:
        - class_path: transformertf.data.transform.MinMaxScaler
          init_args:
            min_: 0
            max_: 1

model:
  class_path: sa_preisach.models.EncoderDecoderPreisachNN
  init_args:
    mesh_scale: 0.005
    mesh_density_function: exponential
    mesh_perturbation_std: 0.005
    encoder:
      class_path: sa_preisach.nn.PreisachLSTMEncoder
      init_args:
        num_features: 2
        hidden_dim: 16
        num_layers: 2
        dropout: 0.1
    num_layers: 3
    hidden_dim: 32
    temp: 1e-2
    lr: 5e-4
    lr_scale: 1e-2
    lr_step_interval: 10
    m_scale_bounds: [0.0, 10.0]
    offset_bounds: [-10.0, 10.0]
    normalized_density: false
    compile_model: false
    linear_fit_steps: 50
    encoder_fit_steps: 4000
    density_fit_steps: 2000
    gradient_clip_val: 1.0

no_auto_configure_optimizers: true # VERY IMPORTANT FOR ALLOWING MULTIPLE OPTIMIZERS
